<div class="login-page">
  <div class="login-card card">
    <div class="login-header">
      <img src="/images/platinum-logo.png" alt="Logo" class="login-logo" />
      <h1 class="login-title">Municipal POS</h1>
      <p class="login-subtitle">Sign in to your account</p>
    </div>

    <form (ngSubmit)="onSubmit()" class="login-form">
      @if (error()) {
        <div class="login-error" data-testid="text-login-error">{{ error() }}</div>
      }

      @if (sites().length > 1) {
        <div class="form-group">
          <label class="form-label" for="site">Site</label>
          <select id="site" class="form-select" [(ngModel)]="selectedSite" name="site" data-testid="select-site">
            @for (site of sites(); track site.id) {
              <option [value]="site.id">{{ site.name }}</option>
            }
          </select>
        </div>
      }

      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input id="username" type="text" class="form-input" [(ngModel)]="username" name="username"
               placeholder="Enter username" autocomplete="username" data-testid="input-username" />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input id="password" type="password" class="form-input" [(ngModel)]="password" name="password"
               placeholder="Enter password" autocomplete="current-password" data-testid="input-password" />
      </div>

      <button type="submit" class="btn-primary login-btn" [disabled]="loading()" data-testid="button-login">
        @if (loading()) {
          <span class="spinner" style="width:1rem;height:1rem;border-width:2px"></span>
          Signing in...
        } @else {
          Sign In
        }
      </button>
    </form>
  </div>
</div>
